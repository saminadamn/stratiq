name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build-test:
    runs-on: ubuntu-latest

    # Real Postgres so integration tests (Sprint 2 dataset ETL flow) hit an
    # actual database, not a mock — the whole point of testing the ETL
    # pipeline is to catch problems that only show up against real Postgres
    # JSON columns, transactions, etc.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stratiq
          POSTGRES_PASSWORD: stratiq_test_password
          POSTGRES_DB: stratiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stratiq -d stratiq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # v1.1 (Distributed Systems Showcase). Real Redis so the
      # Redis-backed cache/rate-limit/queue paths actually run in CI
      # instead of only ever exercising the no-Redis fallback.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stratiq:stratiq_test_password@localhost:5432/stratiq_test?schema=public
      JWT_ACCESS_SECRET: ci-placeholder-access-secret-please-change-32chars
      JWT_REFRESH_SECRET: ci-placeholder-refresh-secret-please-change-32chars
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: apps/ml-service/.python-version
          cache: pip
          cache-dependency-path: apps/ml-service/requirements.txt

      - name: Install ML service dependencies
        run: pip install -r requirements.txt
        working-directory: apps/ml-service

      # The v1.0 predictions/decisions/reports integration test hits a real
      # running ML service (see v1-predictions-flow.test.ts) rather than
      # mocking it, so it needs to actually be up before the Test step.
      - name: Start ML service
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > ml-service.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "ML service is up"
              exit 0
            fi
            sleep 1
          done
          echo "ML service failed to start"
          cat ml-service.log
          exit 1
        working-directory: apps/ml-service

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      # apps/api and apps/web resolve @stratiq/shared via its published
      # dist/ output (see packages/shared/package.json's "main"/"types"),
      # not TS project references, so it must be built before anything
      # that typechecks or lints against it.
      - name: Build shared package
        run: npm run build -w @stratiq/shared

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
