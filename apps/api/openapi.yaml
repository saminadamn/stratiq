openapi: 3.0.3
info:
  title: StratIQ API
  version: 1.0.0
  description: |
    Sprint 2 adds the Data Management & ETL Foundation: dataset upload
    (CSV/Excel), validation, cleaning, versioning, feature engineering, and
    history. Sprint 3 adds the Business Intelligence & Analytics Engine: KPIs,
    the four dashboards (executive/customer/product/inventory), saved
    filter views, and CSV/PDF export. Sprint 4 adds the Analytics
    Intelligence Layer: the Metrics Registry, deterministic Trend Detection,
    Benchmark comparisons (MoM/QoQ/YoY), a configurable Business Rules
    Engine, and the Insight/Alert Timeline generated from them. v1.0 adds
    Predictive Intelligence (churn, forecasting, segmentation, product
    recommendations via an internal ML service). Auth/organization endpoints
    from Sprint 1 are omitted here since this document focuses on what
    Sprints 2-4 and v1.0 added — see docs/ARCHITECTURE.md for the full
    picture.
servers:
  - url: http://localhost:4000/api/v1
security:
  - bearerAuth: []

paths:
  /organizations/{organizationId}/datasets/upload:
    post:
      summary: Upload a new dataset (CSV or Excel)
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or .xlsx file.
                name:
                  type: string
                  description: Dataset name (creates a new dataset).
                cleaningMode:
                  type: string
                  enum: [NONE, AUTOMATIC, MANUAL]
                  default: NONE
                operations:
                  type: string
                  description: Comma-separated CleaningOperationType values, required when cleaningMode=MANUAL.
      responses:
        '201':
          description: Dataset created and processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDatasetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: File exceeds the configured upload size limit.
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organizationId}/datasets:
    get:
      summary: List datasets for an organization
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Datasets with their latest version summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dataset'

  /organizations/{organizationId}/datasets/{datasetId}:
    get:
      summary: Get a dataset
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
      responses:
        '200':
          description: Dataset with its latest version summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a dataset and all its versions
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
      responses:
        '204':
          description: Deleted.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/datasets/{datasetId}/version:
    post:
      summary: Upload a new file as the next version of an existing dataset
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                cleaningMode:
                  type: string
                  enum: [NONE, AUTOMATIC, MANUAL]
                  default: NONE
                operations:
                  type: string
                  description: Comma-separated CleaningOperationType values, required when cleaningMode=MANUAL.
      responses:
        '201':
          description: New version created and processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDatasetResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/datasets/{datasetId}/clean:
    post:
      summary: Clean a dataset, producing a new version
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanDatasetRequest'
      responses:
        '201':
          description: New (cleaned) version created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDatasetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/datasets/{datasetId}/preview:
    get:
      summary: Paginated preview of a dataset version's rows
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
        - $ref: '#/components/parameters/versionQuery'
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        '200':
          description: A page of rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPreview'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/datasets/{datasetId}/quality:
    get:
      summary: Validation report and quality score for a dataset version
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
        - $ref: '#/components/parameters/versionQuery'
      responses:
        '200':
          description: Validation report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/datasets/{datasetId}/history:
    get:
      summary: Version history for a dataset
      tags: [Datasets]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/datasetId'
      responses:
        '200':
          description: All versions, most recent first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetHistory'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/kpis:
    get:
      summary: KPI summary (revenue, orders, AOV, profit, CLV, turnover, top products, ...)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/customerSegment'
      responses:
        '200':
          description: KPI summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiSummary'
        '404':
          description: No ready dataset available for this organization.

  /organizations/{organizationId}/analytics/revenue:
    get:
      summary: Revenue time series and category/region breakdowns
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/customerSegment'
      responses:
        '200':
          description: Revenue analytics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueAnalytics'

  /organizations/{organizationId}/analytics/customers:
    get:
      summary: Customer analytics (also served at /analytics/dashboard/customer)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/customerSegment'
      responses:
        '200':
          description: Customer dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDashboard'

  /organizations/{organizationId}/analytics/products:
    get:
      summary: Product analytics (also served at /analytics/dashboard/product)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/productId'
      responses:
        '200':
          description: Product dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDashboard'

  /organizations/{organizationId}/analytics/inventory:
    get:
      summary: Inventory analytics (also served at /analytics/dashboard/inventory)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/category'
      responses:
        '200':
          description: Inventory dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryDashboard'

  /organizations/{organizationId}/analytics/dashboard/executive:
    get:
      summary: Composite executive dashboard (KPIs + trends + inventory status + alerts)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/customerSegment'
      responses:
        '200':
          description: Executive dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboard'

  /organizations/{organizationId}/analytics/export:
    post:
      summary: Export a dashboard as CSV or PDF
      description: |
        PNG export is not a backend endpoint — chart images are captured
        client-side from the rendered SVG (see docs/ARCHITECTURE.md).
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dashboardType, format]
              properties:
                dashboardType:
                  $ref: '#/components/schemas/DashboardType'
                format:
                  type: string
                  enum: [CSV, PDF]
                filters:
                  $ref: '#/components/schemas/AnalyticsFilters'
      responses:
        '200':
          description: File contents (text/csv or application/pdf).
          content:
            text/csv:
              schema: { type: string }
            application/pdf:
              schema: { type: string, format: binary }

  /organizations/{organizationId}/analytics/views:
    post:
      summary: Save the current filters as a reusable named view
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dashboardType, filters]
              properties:
                name: { type: string }
                dashboardType:
                  $ref: '#/components/schemas/DashboardType'
                filters:
                  $ref: '#/components/schemas/AnalyticsFilters'
      responses:
        '201':
          description: Saved view created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedDashboardView'
    get:
      summary: List saved views for the organization
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - name: dashboardType
          in: query
          schema:
            $ref: '#/components/schemas/DashboardType'
      responses:
        '200':
          description: Saved views.
          content:
            application/json:
              schema:
                type: object
                properties:
                  views:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavedDashboardView'

  /organizations/{organizationId}/analytics/views/{viewId}:
    get:
      summary: Get a saved view
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/viewId'
      responses:
        '200':
          description: Saved view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedDashboardView'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Rename a saved view or update its filters
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/viewId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                filters:
                  $ref: '#/components/schemas/AnalyticsFilters'
      responses:
        '200':
          description: Updated saved view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedDashboardView'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a saved view
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/viewId'
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/metrics:
    get:
      summary: List every metric in the Metrics Registry
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: All known metric definitions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    type: array
                    items: { $ref: '#/components/schemas/MetricDefinition' }

  /organizations/{organizationId}/analytics/metrics/{metricKey}:
    get:
      summary: Get one metric's registry metadata
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/metricKey'
      responses:
        '200':
          description: Metric definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricDefinition'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/trends/{metricKey}:
    get:
      summary: Deterministic trend classification for a metric (Increasing/Stable/Declining/Seasonal) with outliers
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/metricKey'
        - $ref: '#/components/parameters/analyticsDatasetId'
      responses:
        '200':
          description: Trend analysis over the metric's monthly series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendAnalysis'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: The metric cannot be computed for the current dataset (e.g. no date column).

  /organizations/{organizationId}/analytics/benchmarks/{metricKey}:
    get:
      summary: Compare a metric's current period against the previous one (MoM/QoQ/YoY)
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/metricKey'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - name: period
          in: query
          schema: { type: string, enum: [MONTH, QUARTER, YEAR], default: MONTH }
      responses:
        '200':
          description: Benchmark comparison. "Current" is anchored to the latest date present in the dataset, not the system clock.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: The metric cannot be computed for the current dataset (e.g. no date column).

  /organizations/{organizationId}/analytics/insights:
    get:
      summary: Insight Timeline — chronological, rule-based narrative insights per metric
      description: |
        Insights are generated once per immutable dataset version and reused
        afterward; pass forceRefresh=true to regenerate.
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: forceRefresh
          in: query
          schema: { type: string, enum: ['true', 'false'], default: 'false' }
      responses:
        '200':
          description: Insights, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  insights:
                    type: array
                    items: { $ref: '#/components/schemas/Insight' }

  /organizations/{organizationId}/analytics/alerts:
    get:
      summary: List alerts raised by the Business Rules Engine
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED] }
        - name: forceRefresh
          in: query
          schema: { type: string, enum: ['true', 'false'], default: 'false' }
      responses:
        '200':
          description: Alerts, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items: { $ref: '#/components/schemas/Alert' }

  /organizations/{organizationId}/analytics/alerts/{alertId}/acknowledge:
    post:
      summary: Acknowledge an alert
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/alertId'
      responses:
        '200':
          description: Alert with status set to ACKNOWLEDGED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/alerts/{alertId}/resolve:
    post:
      summary: Resolve an alert
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/alertId'
      responses:
        '200':
          description: Alert with status set to RESOLVED and resolvedAt populated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/rules:
    get:
      summary: List business rules (four platform defaults are lazily seeded per organization)
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Business rules.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items: { $ref: '#/components/schemas/BusinessRule' }
    post:
      summary: Create a custom business rule
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRuleRequest'
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessRule'

  /organizations/{organizationId}/analytics/rules/{ruleId}:
    patch:
      summary: Update a business rule's threshold, severity, name, or active state
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/ruleId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessRuleRequest'
      responses:
        '200':
          description: Updated rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessRule'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a business rule
      tags: [Intelligence]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/ruleId'
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organizationId}/analytics/predictions/churn:
    get:
      summary: Customer churn risk predictions
      description: |
        Delegates to the internal ML service (see docs/ARCHITECTURE.md).
        Generated once per dataset version and reused afterward, same as
        Insights/Alerts; pass forceRefresh=true to retrain.
      tags: [Predictions]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/forceRefresh'
      responses:
        '200':
          description: Churn predictions, one per customer with an identifiable customerId column.
          content:
            application/json:
              schema:
                type: object
                properties:
                  predictions:
                    type: array
                    items: { $ref: '#/components/schemas/ChurnPrediction' }

  /organizations/{organizationId}/analytics/predictions/forecast:
    get:
      summary: Sales forecast for the next few periods
      tags: [Predictions]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/forceRefresh'
      responses:
        '200':
          description: Historical revenue series plus forecasted periods. Null if the dataset has no date column.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesForecast'

  /organizations/{organizationId}/analytics/predictions/segments:
    get:
      summary: Customer segments (K-Means over RFM features)
      tags: [Predictions]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/forceRefresh'
      responses:
        '200':
          description: Segment summaries plus each customer's segment assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSegmentation'

  /organizations/{organizationId}/analytics/predictions/recommendations:
    get:
      summary: Product recommendations (popularity + category-affinity hybrid)
      tags: [Predictions]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/forceRefresh'
      responses:
        '200':
          description: Up to 3 recommended products per customer, excluding products they've already bought.
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items: { $ref: '#/components/schemas/ProductRecommendation' }

  /organizations/{organizationId}/analytics/decisions:
    get:
      summary: Root Cause Analysis and Executive Recommendations
      description: |
        The Decision Intelligence Engine — deterministic and rule-based, no
        LLM. Composes existing Insights, Alerts, Benchmarks, and Predictions
        (see docs/ARCHITECTURE.md) into root-cause explanations and
        prioritized, ROI-estimated recommendations with 30/60/90-day action
        plans. Generated once per dataset version and reused afterward.
      tags: [Decisions]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/analyticsDatasetId'
        - $ref: '#/components/parameters/forceRefresh'
      responses:
        '200':
          description: Root causes and recommendations for the resolved dataset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rootCauses:
                    type: array
                    items: { $ref: '#/components/schemas/DecisionRecommendation' }
                  recommendations:
                    type: array
                    items: { $ref: '#/components/schemas/DecisionRecommendation' }

  /organizations/{organizationId}/reports/generate:
    post:
      summary: Generate a PDF report
      description: |
        Composes existing dashboard/prediction/decision data into a PDF —
        no new data-fetching logic (see docs/ARCHITECTURE.md's Module 3
        decisions). Charts are drawn as native PDFKit vector primitives.
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [EXECUTIVE_SUMMARY, KPI, PREDICTION, RECOMMENDATION]
                datasetId: { type: string }
      responses:
        '201':
          description: Report generated and saved to the Download Center.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'

  /organizations/{organizationId}/reports:
    get:
      summary: Report History
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Every report generated for this organization, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items: { $ref: '#/components/schemas/Report' }

  /organizations/{organizationId}/reports/{reportId}/download:
    get:
      summary: Download a previously generated report (Download Center)
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - name: reportId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The PDF file.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    organizationId:
      name: organizationId
      in: path
      required: true
      schema: { type: string }
    datasetId:
      name: datasetId
      in: path
      required: true
      schema: { type: string }
    versionQuery:
      name: version
      in: query
      description: Dataset version id. Defaults to the latest version.
      schema: { type: string }
    viewId:
      name: viewId
      in: path
      required: true
      schema: { type: string }
    analyticsDatasetId:
      name: datasetId
      in: query
      description: Explicit dataset override. Defaults to the organization's most recently updated READY dataset.
      schema: { type: string }
    dateFrom:
      name: dateFrom
      in: query
      schema: { type: string, format: date }
    dateTo:
      name: dateTo
      in: query
      schema: { type: string, format: date }
    category:
      name: category
      in: query
      schema: { type: string }
    region:
      name: region
      in: query
      schema: { type: string }
    productId:
      name: productId
      in: query
      schema: { type: string }
    customerSegment:
      name: customerSegment
      in: query
      schema: { type: string, enum: [NEW, RETURNING, LOYAL] }
    metricKey:
      name: metricKey
      in: path
      required: true
      schema: { type: string }
      description: A key from the Metrics Registry (e.g. revenue, profitMargin, inventoryTurnover).
    alertId:
      name: alertId
      in: path
      required: true
      schema: { type: string }
    ruleId:
      name: ruleId
      in: path
      required: true
      schema: { type: string }
    forceRefresh:
      name: forceRefresh
      in: query
      description: Retrain instead of reusing the cached prediction for this dataset version.
      schema: { type: string, enum: ['true', 'false'], default: 'false' }

  responses:
    BadRequest:
      description: Validation error (malformed request body/query, or an unsupported file type).
    Forbidden:
      description: Caller is not a member of the organization, or lacks the required role.
    NotFound:
      description: Dataset or dataset version not found.

  schemas:
    ColumnSchema:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [STRING, NUMBER, DATE, BOOLEAN] }
        nullable: { type: boolean }

    ValidationIssue:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        count: { type: integer }
        severity: { type: string, enum: [INFO, WARNING, ERROR] }
        column: { type: string }

    ValidationReport:
      type: object
      properties:
        rowCount: { type: integer }
        columnCount: { type: integer }
        issues:
          type: array
          items: { $ref: '#/components/schemas/ValidationIssue' }
        qualityScore: { type: integer, minimum: 0, maximum: 100 }

    FeatureSet:
      type: object
      properties:
        name: { type: string }
        label: { type: string }
        value: {}

    EtlLog:
      type: object
      properties:
        stage: { type: string }
        level: { type: string, enum: [INFO, WARN, ERROR] }
        message: { type: string }
        createdAt: { type: string, format: date-time }

    EtlJobSummary:
      type: object
      properties:
        status:
          type: string
          enum:
            [
              PENDING,
              VALIDATING,
              CLEANING,
              TRANSFORMING,
              FEATURE_ENGINEERING,
              SAVING,
              COMPLETED,
              FAILED,
            ]
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
        errorMessage: { type: string, nullable: true }
        logs:
          type: array
          items: { $ref: '#/components/schemas/EtlLog' }

    DatasetVersion:
      type: object
      properties:
        id: { type: string }
        versionNumber: { type: integer }
        rowCount: { type: integer }
        columnCount: { type: integer }
        schema:
          type: array
          items: { $ref: '#/components/schemas/ColumnSchema' }
        qualityScore: { type: integer, nullable: true }
        cleaningMode: { type: string, enum: [NONE, AUTOMATIC, MANUAL] }
        processingTimeMs: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        originalFileName: { type: string, nullable: true }
        fileSizeBytes: { type: integer, nullable: true }

    Dataset:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [UPLOADING, PROCESSING, READY, FAILED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        versionCount: { type: integer }
        latestVersion:
          allOf:
            - $ref: '#/components/schemas/DatasetVersion'
          nullable: true

    DatasetPreview:
      type: object
      properties:
        columns:
          type: array
          items: { $ref: '#/components/schemas/ColumnSchema' }
        rows:
          type: array
          items: { type: object }
        page: { type: integer }
        pageSize: { type: integer }
        totalRows: { type: integer }

    DatasetHistoryEntry:
      type: object
      properties:
        versionNumber: { type: integer }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        rowCount: { type: integer }
        qualityScore: { type: integer, nullable: true }
        cleaningMode: { type: string, enum: [NONE, AUTOMATIC, MANUAL] }
        originalFileName: { type: string, nullable: true }

    DatasetHistory:
      type: object
      properties:
        dataset:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        versions:
          type: array
          items: { $ref: '#/components/schemas/DatasetHistoryEntry' }

    UploadDatasetResponse:
      type: object
      properties:
        dataset: { $ref: '#/components/schemas/Dataset' }
        version: { $ref: '#/components/schemas/DatasetVersion' }
        validationReport: { $ref: '#/components/schemas/ValidationReport' }
        featureSets:
          type: array
          items: { $ref: '#/components/schemas/FeatureSet' }
        etlJob: { $ref: '#/components/schemas/EtlJobSummary' }

    CleanDatasetRequest:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [AUTOMATIC, MANUAL] }
        operations:
          type: array
          items:
            type: string
            enum:
              - REMOVE_DUPLICATES
              - FILL_MISSING_VALUES
              - CONVERT_DATA_TYPES
              - STANDARDIZE_CATEGORIES
              - TRIM_WHITESPACE
              - REMOVE_INVALID_RECORDS
          description: Required when mode=MANUAL.
        sourceVersionId:
          type: string
          description: Defaults to the dataset's latest version if omitted.

    DashboardType:
      type: string
      enum: [EXECUTIVE, CUSTOMER, PRODUCT, INVENTORY]

    AnalyticsFilters:
      type: object
      properties:
        datasetId: { type: string }
        dateFrom: { type: string, format: date }
        dateTo: { type: string, format: date }
        category: { type: string }
        region: { type: string }
        productId: { type: string }
        customerSegment: { type: string, enum: [NEW, RETURNING, LOYAL] }

    TimeSeriesPoint:
      type: object
      properties:
        period: { type: string }
        value: { type: number }

    CategoryValue:
      type: object
      properties:
        label: { type: string }
        value: { type: number }

    TopProduct:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        revenue: { type: number }
        unitsSold: { type: integer }

    KpiSummary:
      type: object
      properties:
        revenue: { type: number }
        totalOrders: { type: integer }
        averageOrderValue: { type: number }
        grossProfit: { type: number, nullable: true }
        profitMargin: { type: number, nullable: true }
        repeatPurchaseRate: { type: number, nullable: true }
        activeCustomers: { type: integer }
        customerLifetimeValue: { type: number, nullable: true }
        inventoryTurnover: { type: number, nullable: true }
        monthlyGrowthRate: { type: number, nullable: true }
        topProducts:
          type: array
          items:
            $ref: '#/components/schemas/TopProduct'

    RevenueAnalytics:
      type: object
      properties:
        totalRevenue: { type: number }
        monthlyRevenueTrend:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        revenueByCategory:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        revenueByRegion:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        generatedAt: { type: string, format: date-time }
        datasetId: { type: string }
        datasetVersionId: { type: string }

    LowStockProduct:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        stockLevel: { type: integer }
        reorderLevel: { type: integer, nullable: true }

    InventoryStatusSummary:
      type: object
      properties:
        totalSkus: { type: integer }
        lowStockCount: { type: integer }
        overstockCount: { type: integer }
        totalInventoryValue: { type: number, nullable: true }

    ExecutiveDashboard:
      type: object
      properties:
        kpis: { $ref: '#/components/schemas/KpiSummary' }
        monthlyRevenueTrend:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        ordersOverTime:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        revenueByCategory:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        revenueByRegion:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        topProduct:
          allOf: [{ $ref: '#/components/schemas/TopProduct' }]
          nullable: true
        inventoryStatus:
          allOf: [{ $ref: '#/components/schemas/InventoryStatusSummary' }]
          nullable: true
        lowStockAlerts:
          type: array
          items: { $ref: '#/components/schemas/LowStockProduct' }
        generatedAt: { type: string, format: date-time }
        datasetId: { type: string }
        datasetVersionId: { type: string }

    TopCustomer:
      type: object
      properties:
        customerId: { type: string }
        customerName: { type: string }
        totalSpent: { type: number }
        orderCount: { type: integer }

    CustomerDashboard:
      type: object
      properties:
        newCustomers: { type: integer }
        returningCustomers: { type: integer }
        retentionRate: { type: number, nullable: true }
        averagePurchaseFrequency: { type: number, nullable: true }
        customerLifetimeValue: { type: number, nullable: true }
        repeatPurchaseRate: { type: number, nullable: true }
        topCustomers:
          type: array
          items: { $ref: '#/components/schemas/TopCustomer' }
        customerDistributionByRegion:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        segmentBreakdown:
          type: array
          items:
            type: object
            properties:
              segment: { type: string, enum: [NEW, RETURNING, LOYAL] }
              customerCount: { type: integer }
        cohortAnalysis:
          type: array
          items:
            type: object
            properties:
              cohortPeriod: { type: string }
              retainedCustomersByPeriod:
                type: array
                items: { type: integer }
        purchaseFrequencyHistogram:
          type: array
          items:
            type: object
            properties:
              bucket: { type: string }
              customerCount: { type: integer }
        generatedAt: { type: string, format: date-time }
        datasetId: { type: string }
        datasetVersionId: { type: string }

    ProductPerformance:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        revenue: { type: number }
        profit: { type: number, nullable: true }
        unitsSold: { type: integer }

    ProductDashboard:
      type: object
      properties:
        bestSellers:
          type: array
          items: { $ref: '#/components/schemas/ProductPerformance' }
        worstSellers:
          type: array
          items: { $ref: '#/components/schemas/ProductPerformance' }
        categoryPerformance:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        productContribution:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        generatedAt: { type: string, format: date-time }
        datasetId: { type: string }
        datasetVersionId: { type: string }

    StockLevel:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        category: { type: string, nullable: true }
        stockLevel: { type: integer }
        reorderLevel: { type: integer, nullable: true }
        status: { type: string, enum: [LOW, NORMAL, OVERSTOCK] }

    InventoryDashboard:
      type: object
      properties:
        totalSkus: { type: integer }
        totalInventoryValue: { type: number, nullable: true }
        inventoryTurnover: { type: number, nullable: true }
        lowStockProducts:
          type: array
          items: { $ref: '#/components/schemas/StockLevel' }
        overstockProducts:
          type: array
          items: { $ref: '#/components/schemas/StockLevel' }
        stockLevels:
          type: array
          items: { $ref: '#/components/schemas/StockLevel' }
        categoryDistribution:
          type: array
          items: { $ref: '#/components/schemas/CategoryValue' }
        inventoryTrend:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
          nullable: true
        generatedAt: { type: string, format: date-time }
        datasetId: { type: string }
        datasetVersionId: { type: string }

    SavedDashboardView:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        dashboardType:
          $ref: '#/components/schemas/DashboardType'
        filters:
          $ref: '#/components/schemas/AnalyticsFilters'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          type: object
          properties:
            id: { type: string }
            name: { type: string }

    MetricDefinition:
      type: object
      description: One entry from the Metrics Registry — metadata only; the actual computation lives in the KPI engine (see docs/ARCHITECTURE.md).
      properties:
        key: { type: string }
        name: { type: string }
        description: { type: string }
        category:
          type: string
          enum: [REVENUE, PROFITABILITY, CUSTOMER, PRODUCT, INVENTORY, GROWTH]
        formula: { type: string }
        unit:
          type: string
          enum: [CURRENCY, PERCENTAGE, COUNT, RATIO]
        owner: { type: string }
        refreshPolicy:
          type: string
          enum: [REALTIME, DAILY, ON_DATASET_UPLOAD]

    TrendOutlier:
      type: object
      properties:
        period: { type: string }
        value: { type: number }
        zScore: { type: number }

    TrendAnalysis:
      type: object
      properties:
        metricKey: { type: string }
        direction: { type: string, enum: [INCREASING, STABLE, DECLINING, SEASONAL] }
        averageChangePercent: { type: number, nullable: true }
        series:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        outliers:
          type: array
          items: { $ref: '#/components/schemas/TrendOutlier' }

    BenchmarkResult:
      type: object
      properties:
        metricKey: { type: string }
        period: { type: string, enum: [MONTH, QUARTER, YEAR] }
        currentPeriodLabel: { type: string }
        previousPeriodLabel: { type: string }
        currentValue: { type: number, nullable: true }
        previousValue: { type: number, nullable: true }
        changeAbsolute: { type: number, nullable: true }
        changePercent: { type: number, nullable: true }

    Insight:
      type: object
      description: One entry in the Insight Timeline — a human-readable narrative composed from Trend Detection, the Benchmark Engine, and any Business Rules that fired.
      properties:
        id: { type: string }
        metricKey: { type: string }
        title: { type: string }
        narrative: { type: string }
        trend: { type: string, enum: [INCREASING, STABLE, DECLINING, SEASONAL], nullable: true }
        severity: { type: string, enum: [INFO, WARNING, CRITICAL] }
        currentValue: { type: number }
        previousValue: { type: number, nullable: true }
        changePercent: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }

    Alert:
      type: object
      properties:
        id: { type: string }
        metricKey: { type: string }
        ruleId: { type: string, nullable: true }
        severity: { type: string, enum: [INFORMATIONAL, WARNING, CRITICAL] }
        message: { type: string }
        currentValue: { type: number }
        thresholdValue: { type: number, nullable: true }
        status: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED] }
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    BusinessRule:
      type: object
      properties:
        id: { type: string }
        metricKey: { type: string }
        name: { type: string }
        comparator:
          type: string
          enum: [VALUE_ABOVE, VALUE_BELOW, PERCENT_CHANGE_ABOVE, PERCENT_CHANGE_BELOW]
        thresholdValue: { type: number }
        severity: { type: string, enum: [INFORMATIONAL, WARNING, CRITICAL] }
        isActive: { type: boolean }
        isDefault:
          type: boolean
          description: True for the four platform-seeded defaults; false for user-created rules.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateBusinessRuleRequest:
      type: object
      required: [metricKey, name, comparator, thresholdValue, severity]
      properties:
        metricKey: { type: string }
        name: { type: string }
        comparator:
          type: string
          enum: [VALUE_ABOVE, VALUE_BELOW, PERCENT_CHANGE_ABOVE, PERCENT_CHANGE_BELOW]
        thresholdValue: { type: number }
        severity: { type: string, enum: [INFORMATIONAL, WARNING, CRITICAL] }

    UpdateBusinessRuleRequest:
      type: object
      properties:
        name: { type: string }
        thresholdValue: { type: number }
        severity: { type: string, enum: [INFORMATIONAL, WARNING, CRITICAL] }
        isActive: { type: boolean }

    FeatureImportance:
      type: object
      properties:
        feature: { type: string }
        importance: { type: number }

    PredictionExplanation:
      type: object
      description: Native feature-importance explanation (see docs/ARCHITECTURE.md — SHAP was deliberately not used).
      properties:
        method: { type: string }
        topFeatures:
          type: array
          items: { $ref: '#/components/schemas/FeatureImportance' }

    ChurnPrediction:
      type: object
      properties:
        customerId: { type: string }
        customerName: { type: string, nullable: true }
        churnProbability: { type: number, minimum: 0, maximum: 1 }
        confidence: { type: number, minimum: 0, maximum: 1 }
        explanation: { $ref: '#/components/schemas/PredictionExplanation' }

    SalesForecastPoint:
      type: object
      properties:
        period: { type: string }
        value: { type: number }
        isForecast: { type: boolean }

    SalesForecast:
      type: object
      nullable: true
      properties:
        modelVersion: { type: integer }
        confidence: { type: number }
        history:
          type: array
          items: { $ref: '#/components/schemas/TimeSeriesPoint' }
        forecast:
          type: array
          items: { $ref: '#/components/schemas/SalesForecastPoint' }
        explanation: { $ref: '#/components/schemas/PredictionExplanation' }

    CustomerSegment:
      type: object
      properties:
        segmentId: { type: integer }
        label: { type: string }
        customerCount: { type: integer }
        averageSpend: { type: number }
        averageOrders: { type: number }

    CustomerSegmentation:
      type: object
      nullable: true
      properties:
        modelVersion: { type: integer }
        segments:
          type: array
          items: { $ref: '#/components/schemas/CustomerSegment' }
        assignments:
          type: array
          items:
            type: object
            properties:
              customerId: { type: string }
              segmentId: { type: integer }

    ProductRecommendation:
      type: object
      properties:
        customerId: { type: string }
        recommendedProductId: { type: string }
        recommendedProductName: { type: string, nullable: true }
        score: { type: number }
        reason: { type: string }

    ActionPlanItem:
      type: object
      properties:
        day: { type: integer, enum: [30, 60, 90] }
        action: { type: string }

    DecisionRecommendation:
      type: object
      properties:
        id: { type: string }
        category: { type: string, enum: [ROOT_CAUSE, RECOMMENDATION] }
        title: { type: string }
        rootCause: { type: string, nullable: true }
        recommendationText: { type: string, nullable: true }
        roiEstimate:
          type: number
          nullable: true
          description: Estimated dollar impact of acting on this recommendation — a documented fixed-multiplier assumption, not a fitted forecast.
        impactScore: { type: number, description: 0-100 relative severity/impact score. }
        priority: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        actionPlan:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/ActionPlanItem' }
        createdAt: { type: string, format: date-time }

    Report:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [EXECUTIVE_SUMMARY, KPI, PREDICTION, RECOMMENDATION] }
        fileName: { type: string }
        generatedAt: { type: string, format: date-time }
        generatedBy:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
