# Production stack. Run from the repo root:
#   docker compose -f docker/docker-compose.prod.yml up --build -d
#
# Only `nginx` is published to the host. Everything else — db, api, web,
# ml-service — talks over the internal compose network only; ml-service in
# particular is never reachable from outside the api container (see
# ML_SERVICE_URL), matching the "ML service is internal-only" decision.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stratiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stratiq_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-stratiq}
    volumes:
      - stratiq_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stratiq} -d ${POSTGRES_DB:-stratiq}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ml-service:
    build:
      # Its own directory, not the repo root: the Dockerfile's COPY paths
      # (requirements.txt, app) are relative to apps/ml-service itself.
      context: ../apps/ml-service
      target: prod
    volumes:
      - stratiq_model_store:/app/model_store
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  # v1.1 (Distributed Systems Showcase). Optional, same as the dev compose —
  # api/worker degrade to single-process behavior without it.
  redis:
    image: redis:7-alpine
    volumes:
      - stratiq_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: prod
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratiq}:${POSTGRES_PASSWORD:-stratiq_dev_password}@db:5432/${POSTGRES_DB:-stratiq}?schema=public
      ML_SERVICE_URL: http://ml-service:8000
      REDIS_URL: redis://redis:6379
      # A dedicated `worker` container below consumes the report queue in
      # this stack, so the API itself shouldn't also compete for jobs.
      WORKER_MODE: standalone
    volumes:
      - stratiq_storage:/app/apps/api/storage
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: prod
    command: ['node', 'dist/worker.js']
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratiq}:${POSTGRES_PASSWORD:-stratiq_dev_password}@db:5432/${POSTGRES_DB:-stratiq}?schema=public
      ML_SERVICE_URL: http://ml-service:8000
      REDIS_URL: redis://redis:6379
      WORKER_MODE: standalone
    volumes:
      - stratiq_storage:/app/apps/api/storage
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: prod
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  stratiq_postgres_data_prod:
  stratiq_model_store:
  stratiq_storage:
  stratiq_redis_data:
