# Top-level reverse proxy for the production stack (docker-compose.prod.yml).
# This is the ONLY service published to the host — web, api, db, and
# ml-service all stay on the internal compose network. Routes:
#   /health, /health/ready -> api:4000  (liveness/readiness live at the
#                                        Express app root, not under /api/v1
#                                        — see apps/api/src/presentation/http/app.ts)
#   /api/*                 -> api:4000  (includes /api/docs, the Swagger UI)
#   /*                     -> web:80    (the static SPA bundle, served by its own nginx)
# ml-service is deliberately not routed here at all: it's internal-only,
# reachable solely from the api container (see ML_SERVICE_URL).
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    client_max_body_size 30m;

    server {
        listen 80;
        server_name _;

        location = /health {
            proxy_pass http://api:4000/health;
            proxy_set_header Host $host;
        }

        location = /health/ready {
            proxy_pass http://api:4000/health/ready;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://api:4000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
