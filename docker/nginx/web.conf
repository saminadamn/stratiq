# Serves the built React SPA from inside the web container (docker/Dockerfile.web
# prod target). `try_files ... /index.html` is the standard client-side-router
# fallback: any path that isn't a real static asset falls through to index.html
# so React Router can render it instead of nginx returning a 404.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
